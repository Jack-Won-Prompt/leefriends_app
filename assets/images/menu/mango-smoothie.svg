<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE29A"/>
      <stop offset="0.55" stop-color="#FFB347"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <radialGradient id="h" cx="0.3" cy="0.25" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#g)"/>
  <rect width="800" height="600" fill="url(#h)"/>
  <circle cx="640" cy="120" r="150" fill="#ffffff" opacity="0.10"/>
  <circle cx="120" cy="500" r="110" fill="#ffffff" opacity="0.08"/>
  <g filter="url(#soft)">
    <circle cx="400" cy="250" r="120" fill="#ffffff" opacity="0.92"/>
    <text x="400" y="250" font-size="120" text-anchor="middle" dominant-baseline="central">🥤</text>
  </g>
  <text x="400" y="430" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="54" font-weight="800" fill="#ffffff" text-anchor="middle">망고스무디</text>
  <text x="400" y="480" font-family="'Pretendard',sans-serif" font-size="26" font-weight="500" fill="#ffffff" opacity="0.85" text-anchor="middle" letter-spacing="3">MANGO SMOOTHIE</text>
